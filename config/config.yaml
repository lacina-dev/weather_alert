general:
  # Select location from list below (override locally via config.local.yaml)
  default_location: "Custom"
  # Use map as background 0: no map, 1: osm, 2: google satellite
  use_map: 1
  # Radar data source: "rainviewer" or "chmi"
  # rainviewer – global coverage, no API key required, free tier has no nowcast, max zoom 7
  # chmi       – Czech Republic + neighbours, real radar + 60-min nowcast, completely free
  source: "chmi"

radar:
  # Distance in kilometers. Inner radius of the square frame.
  frame_rain: 1
  frame_alert: 9
  frame_warning: 20
  # Miniumum percent of rain in frame. Value bellow will be ignored as a noise.
  min_rain: 5.0
  min_alert: 10.0
  min_warning: 30.0
  snow: 0
  smooth: 1
  # Possible values 256 or 512 in px
  size: 512
  zoom: 8  # RainViewer: API max allowed zoom is 7; code subtracts 1 for size 512
  # Rain threshold:
  #   RainViewer: 215 removes light grey (sub-rain echo)
  #   ČHMÚ:       IGNORED – every ČHMÚ palette colour except the two
  #               "no rain" shades (black=no echo, grey=below noise) is
  #               counted as rain, so ALL rain is shown automatically.
  rain_threshold: 100
  # Color scheme values 0-8 (RainViewer only). See https://www.rainviewer.com/api/color-schemes.html
  color: 1


